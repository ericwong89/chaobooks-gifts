<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>赠品集</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <a href="/index.html" class="logo">
      <span class="logo-badge">赠</span>
      <span class="logo-text" data-i18n="brand">赠品集</span>
    </a>
    <nav class="nav-links">
      <a href="#" data-i18n="nav_home">首页</a>
      <a href="#" data-i18n="nav_category">分类</a>
    </nav>
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="zh-cn">简体</button>
      <button class="lang-btn" data-lang="zh-tw">繁體</button>
    </div>
  </header>

  <!-- CAROUSEL -->
  <section class="carousel">
    <div class="carousel-inner" id="carouselInner">
      <!-- JS rendered -->
    </div>
    <div class="carousel-dots" id="carouselDots"></div>
    <button class="carousel-arrow prev" id="carPrev">&#8249;</button>
    <button class="carousel-arrow next" id="carNext">&#8250;</button>
  </section>

  <!-- CATEGORY TABS -->
  <section class="category-tabs">
    <div class="tabs-scroll">
      <button class="tab active" data-cat="all" data-i18n="all">全部</button>
      <!-- JS renders more tabs from JSON categories -->
    </div>
  </section>

  <!-- PRODUCT GRID -->
  <main class="product-grid" id="productGrid">
    <!-- JS rendered -->
  </main>

  <!-- PRODUCT DETAIL MODAL -->
  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal" id="productModal">
      <button class="modal-close" id="modalClose" data-i18n="back">← 返回</button>
      <div class="modal-img" id="modalImg"></div>
      <span class="modal-cat" id="modalCat"></span>
      <h2 class="modal-title" id="modalTitle"></h2>
      <p class="modal-desc" id="modalDesc"></p>
      <a class="taobao-btn" id="modalBuyBtn" target="_blank" rel="noopener" data-i18n="buy_btn">淘宝购买</a>
    </div>
  </div>

  <script src="/assets/js/i18n.js"></script>
  <script src="/assets/js/app.js"></script>
</body>
</html>
