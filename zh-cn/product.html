<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="page_product">商品详情</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    .product-page { max-width: 640px; margin: 0 auto; padding: 20px 16px 60px; }
    .product-hero-img {
      width: 100%; height: 260px;
      background: var(--red-light);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; margin-bottom: 20px;
    }
    .product-hero-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .product-page-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 24px; font-weight: 700;
      line-height: 1.35; margin-bottom: 12px;
      color: var(--ink);
    }
    .product-page-desc {
      font-size: 15px; color: var(--ink2);
      line-height: 1.8; margin-bottom: 28px;
    }
    .product-page-buy {
      display: block; width: 100%;
      background: var(--red); color: #fff;
      text-align: center;
      padding: 14px; border-radius: 28px;
      font-size: 16px; font-weight: 500;
      letter-spacing: 1px;
      transition: background 0.15s;
    }
    .product-page-buy:hover { background: #b84720; }
    .breadcrumb {
      font-size: 13px; color: var(--ink3);
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 6px;
    }
    .breadcrumb a { color: var(--ink3); }
    .breadcrumb a:hover { color: var(--red); }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <a href="/index.html" class="logo">
      <span class="logo-badge">赠</span>
      <span class="logo-text" data-i18n="brand">赠品集</span>
    </a>
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="zh-cn">简体</button>
      <button class="lang-btn" data-lang="zh-tw">繁體</button>
    </div>
  </header>

  <div class="product-page">

    <!-- BREADCRUMB -->
    <nav class="breadcrumb">
      <a href="/index.html" data-i18n="nav_home">首页</a>
      <span>›</span>
      <span id="bc-cat"></span>
      <span>›</span>
      <span id="bc-title"></span>
    </nav>

    <!-- HERO IMAGE -->
    <div class="product-hero-img" id="heroImg">
      <span class="product-emoji large" id="heroEmoji"></span>
    </div>

    <!-- META -->
    <div class="product-meta">
      <span class="modal-cat" id="pageCat"></span>
    </div>

    <h1 class="product-page-title" id="pageTitle"></h1>
    <p class="product-page-desc" id="pageDesc"></p>

    <a class="product-page-buy" id="pageBuyBtn"
       target="_blank" rel="noopener"
       data-i18n="buy_btn">淘宝购买</a>

  </div>

  <script src="/assets/js/i18n.js"></script>
  <script>
    const DATA_URL = '/data/products.json';

    // Read product id from URL: /zh-cn/product/001.html → id = "001"
    function getProductId() {
      const parts = window.location.pathname.split('/');
      const file = parts[parts.length - 1].replace('.html', '');
      return file;
    }

    async function loadProduct() {
      const id = getProductId();
      const res = await fetch(DATA_URL);
      const products = await res.json();
      const p = products.find(x => x.id === id);
      if (!p) { document.body.innerHTML += '<p style="padding:40px;text-align:center">商品未找到</p>'; return; }

      function render(lang) {
        document.getElementById('heroEmoji').textContent = p.emoji || '';
        if (p.image) {
          const img = document.createElement('img');
          img.src = p.image;
          img.alt = p.title[lang];
          img.onerror = () => img.style.display = 'none';
          document.getElementById('heroImg').appendChild(img);
        }
        document.getElementById('pageCat').textContent = p.category;
        document.getElementById('pageTitle').textContent = p.title[lang];
        document.getElementById('pageDesc').textContent = p.desc[lang];
        document.getElementById('pageBuyBtn').href = p.link_taobao;
        document.getElementById('pageBuyBtn').textContent = t('buy_btn');
        document.getElementById('bc-cat').textContent = p.category;
        document.getElementById('bc-title').textContent = p.title[lang];
        document.title = p.title[lang] + ' — ' + t('brand');
      }

      render(currentLang);

      // Re-render on lang change
      window.onLangChange = (lang) => render(lang);
    }

    document.addEventListener('DOMContentLoaded', loadProduct);
  </script>
</body>
</html>
