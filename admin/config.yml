backend:
  name: github
  repo: ericwong89/chaobooks-gifts
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "data"
    label: "数据管理"
    # 我们改用 folder 模式来直接操作这个 json，这是对付纯数组最稳的方式
    files:
      - label: "赠品列表"
        name: "products_file"
        file: "data/products.json"
        # 核心修正：这里不使用嵌套的 list，直接定义顶级字段
        fields:
          - label: "产品列表"
            name: "products" # 这里必须对应，CMS 会尝试把数组内容填入这个 key
            widget: "list"
            summary: "{{title.zh-cn}}"
            fields:
              - { label: "系统 ID", name: "id", widget: "string" }
              - label: "标题"
                name: "title"
                widget: "object"
                fields:
                  - { label: "简体标题", name: "zh-cn", widget: "string" }
                  - { label: "繁体标题", name: "zh-tw", widget: "string" }
              - label: "描述"
                name: "desc"
                widget: "object"
                fields:
                  - { label: "简体描述", name: "zh-cn", widget: "text" }
                  - { label: "繁体描述", name: "zh-tw", widget: "text" }
              - { label: "图片路径", name: "image", widget: "image" }
              - { label: "Emoji", name: "emoji", widget: "string" }
              - { label: "淘宝链接", name: "link_taobao", widget: "string" }
              - { label: "分类", name: "category", widget: "string" }
              - { label: "热门推荐", name: "hot", widget: "boolean" }
