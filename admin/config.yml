backend:
  name: github
  repo: ericwong89/chaobooks-gifts
  branch: main
  # 关键：改用开源的认证中转站，不再求 Netlify
  base_url: https://cms-proxy.decapcms.org
  auth_endpoint: auth
  site_id: chaobooks-gifts
  
media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "data"
    label: "数据管理"
    files:
      - label: "赠品列表"
        name: "products_file"
        file: "data/products.json"
        fields:
          - label: "产品列表"
            name: "products"
            widget: "list"
            summary: "{{title.zh-cn}}"
            fields:
              - { label: "系统 ID", name: "id", widget: "string" }
              - label: "标题"
                name: "title"
                widget: "object"
                fields:
                  - { label: "简体标题", name: "zh-cn", widget: "string" }
                  - { label: "繁体标题", name: "zh-tw", widget: "string" }
              - label: "描述"
                name: "desc"
                widget: "object"
                fields:
                  - { label: "简体描述", name: "zh-cn", widget: "text" }
                  - { label: "繁体描述", name: "zh-tw", widget: "text" }
              - { label: "图片路径/URL", name: "image", widget: "string", hint: "直接贴腾讯云链接" }
              - { label: "Emoji图标", name: "emoji", widget: "string", default: "✨" }
              - { label: "淘宝链接", name: "link_taobao", widget: "string" }
              - { label: "分类", name: "category", widget: "string" }
              - { label: "热门推荐", name: "hot", widget: "boolean", default: false }
